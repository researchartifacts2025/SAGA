# @package _global_
# Single-axis parameter sweeps. Each axis varies one parameter; all others
# stay at the SAGA defaults.

defaults:
  - override /cluster: a100_64gpu

experiment:
  name: sensitivity
  description: "Parameter sensitivity sweeps for SAGA on SWE-bench."
  workload:
    name: swe_bench
    n_tasks: 100
    arrival_rate_per_minute: 8.0
  n_seeds: 2
  seeds: [42, 123]
  sweeps:
    walru_alpha: [0.2, 0.3, 0.4]
    walru_beta: [0.4, 0.5, 0.6]
    walru_gamma: [0.1, 0.2, 0.3]
    load_threshold: [0.6, 0.8, 0.95]
    t_idle_ms: [50.0, 100.0, 200.0]
    r_max: [1.5, 2.0, 3.0]
    ttl_max_ms: [120000.0, 300000.0, 600000.0]
    pressure_low: [0.6, 0.7, 0.8]
    pressure_high: [0.85, 0.9, 0.95]

horizon_ms: 1200000
